      window.addEventListener("error", function (event) {
        const errorObj = {
          message: event.message,
          source: event.filename,
          lineno: event.lineno,
          colno: event.colno,
          stack: event.error ? event.error.stack : null
        };
        window.parent.postMessage(
          { action: "error", error: JSON.stringify(errorObj) },
          "*"
        );
        event.preventDefault();
      });

  function handleImportError(error) {
    throw new Error('Import module failed: ' + error.target.src);
  }

  const observer = new MutationObserver(mutations => {
    mutations.forEach(mutation => {
      mutation.addedNodes.forEach(node => {
        if (node.tagName === 'SCRIPT' && node.type === 'module') {
          node.onerror = handleImportError;
        }
      });
    });
  });

  observer.observe(document.documentElement, { childList: true, subtree: true });

  document.querySelectorAll('script[type="module"]').forEach(script => {
    script.onerror = handleImportError;
  });

  
window.console = new Proxy(console, {
  get(target, prop) {
    if (['log', 'warn', 'error'].includes(prop)) {
      return new Proxy(target[prop], {
        apply(fn, thisArg, args) {
          fn.apply(thisArg, args);
          window.parent.postMessage({ action: 'console', 
            type: prop, 
            args: args.map((arg) => {
              try {
                return JSON.stringify(arg).replace(/^["']|["']$/g, '');
              } catch (e) {
                return arg;
              }
            }) 
          }, '*');
        }
      });
    }
    return target[prop];
  }
});

const LocationRibbon = ({ location, setLocation }) => {
  const levels = [
    { key: "expanse", label: "Expanse", width: "w-28" },
    { key: "reach", label: "Reach", width: "w-28" },
    { key: "domain", label: "Domain", width: "w-24" },
    { key: "region", label: "Region", width: "w-24" },
    { key: "quadrant", label: "Quadrant", width: "w-28" },
    { key: "sector", label: "Sector", width: "w-24" },
    { key: "subsector", label: "Subsector", width: "w-28" },
    { key: "hex", label: "Hex", width: "w-20" },
  ]

  const generateOptions = (key) => {
    const prefixes = {
      expanse: ["Alpha", "Beta", "Gamma", "Delta", "Epsilon", "Zeta"],
      reach: ["Inner", "Outer", "Eastern", "Western", "Northern", "Southern", "Deep", "Void"],
      domain: ["Arcanis", "Cylos", "Mython", "Solara", "Veridia", "Nexar", "Orion", "Lyra"],
      region: ["Nebula", "Cluster", "Drift", "Cloud", "Expanse", "Rift", "Zone", "Belt"],
      quadrant: ["Alpha", "Beta", "Gamma", "Delta"],
      sector: ["Prime", "Secundus", "Tertius", "Quartus", "Quintus", "Sextus"],
      subsector: ["I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX", "X"],
      hex: ["01", "02", "03", "04", "05", "06", "07", "08", "09", "0A", "0B", "0C"],
    }
    return prefixes[key] || []
  }

  return (
    <div className="flex items-center gap-1 bg-gray-900/95 border border-cyan-900/60 rounded-lg p-2 overflow-x-auto">
      <div className="flex items-center gap-1 mr-1">
        <Radio className="w-3.5 h-3.5 text-cyan-400" />
        <span className="text-[10px] font-semibold text-cyan-300 uppercase tracking-widest">Nav</span>
      </div>
      {levels.map((lv) => (
        <div key={lv.key} className="flex items-center gap-0">
          <select
            value={location[lv.key]}
            onChange={(e) => setLocation({ ...location, [lv.key]: e.target.value })}
            className={`${lv.width} bg-gray-800 border border-cyan-800/50 text-cyan-200 text-[10px] py-1 px-1.5 rounded
              focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500/30
              appearance-none cursor-pointer hover:bg-gray-750 transition-colors
              font-mono tracking-tight`}
            style={{
              backgroundImage: `url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2306b6d4' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e")`,
              backgroundPosition: "right 2px center",
              backgroundRepeat: "no-repeat",
              backgroundSize: "14px",
              paddingRight: "18px",
            }}
          >
            {generateOptions(lv.key).map((opt) => (
              <option key={opt} value={opt}>
                {opt}
              </option>
            ))}
          </select>
          {lv.key !== "hex" && <ChevronRight className="w-3 h-3 text-cyan-700/60 mx-0.5 flex-shrink-0" />}
        </div>
      ))}
    </div>
  )
}

const Knob = ({ label, value, onChange, min = 0, max = 100, size = "md", units = "" }) => {
  const angle = ((value - min) / (max - min)) * 270 - 135
  const sizeMap = { sm: 48, md: 64, lg: 80 }
  const dim = sizeMap[size] || 64
  const cx = dim / 2
  const cy = dim / 2
  const r = dim * 0.35
  const indicatorLen = dim * 0.22
  const rad = (angle * Math.PI) / 180
  const ix = cx + indicatorLen * Math.cos(rad)
  const iy = cy + indicatorLen * Math.sin(rad)

  return (
    <div className="flex flex-col items-center gap-1">
      <div className="relative" style={{ width: dim, height: dim }}>
        {/* Sweep arc background */}
        <svg width={dim} height={dim} className="absolute inset-0">
          <path
            d={`M ${cx + r * Math.cos((-135 * Math.PI) / 180)} ${cy + r * Math.sin((-135 * Math.PI) / 180)}
                A ${r} ${r} 0 0 1 ${cx + r * Math.cos((135 * Math.PI) / 180)} ${cy + r * Math.sin((135 * Math.PI) / 180)}`}
            fill="none"
            stroke="#1e3a4a"
            strokeWidth="4"
            strokeLinecap="round"
          />
          {/* Active arc */}
          <path
            d={`M ${cx + r * Math.cos((-135 * Math.PI) / 180)} ${cy + r * Math.sin((-135 * Math.PI) / 180)}
                A ${r} ${r} 0 ${angle > 0 ? 0 : 0} 1 ${cx + r * Math.cos(rad)} ${cy + r * Math.sin(rad)}`}
            fill="none"
            stroke="#06b6d4"
            strokeWidth="4"
            strokeLinecap="round"
          />
          {/* Tick marks */}
          {[-135, -90, -45, 0, 45, 90, 135].map((tickDeg) => {
            const tickRad = (tickDeg * Math.PI) / 180
            const outerR = r + 6
            const innerR = r - 2
            return (
              <line
                key={tickDeg}
                x1={cx + innerR * Math.cos(tickRad)}
                y1={cy + innerR * Math.sin(tickRad)}
                x2={cx + outerR * Math.cos(tickRad)}
                y2={cy + outerR * Math.sin(tickRad)}
                stroke="#0e5a6e"
                strokeWidth="1.5"
                strokeLinecap="round"
              />
            )
          })}
        </svg>
        {/* Knob body */}
        <div
          className="absolute inset-1 rounded-full cursor-pointer flex items-center justify-center
            bg-gradient-to-br from-gray-700 to-gray-900 border border-cyan-700/40
            shadow-inner shadow-black/50 hover:border-cyan-500/60 transition-colors"
          onClick={() => onChange(Math.min(max, value + 5))}
          onContextMenu={(e) => {
            e.preventDefault()
            onChange(Math.max(min, value - 5))
          }}
        >
          {/* Indicator dot */}
          <div
            className="absolute w-1 h-1 rounded-full bg-cyan-400 shadow-[0_0_4px_#06b6d4]"
            style={{
              transform: `translate(${ix - cx}px, ${iy - cy}px)`,
              left: "50%",
              top: "50%",
            }}
          />
          {/* Center cap */}
          <div className="w-3 h-3 rounded-full bg-gray-800 border border-cyan-800/50" />
        </div>
        {/* Click zones */}
        <div
          className="absolute top-0 left-1/2 -translate-x-1/2 w-4 h-4 cursor-pointer opacity-0"
          onClick={() => onChange(Math.min(max, value + 5))}
        />
        <div
          className="absolute bottom-0 left-1/2 -translate-x-1/2 w-4 h-4 cursor-pointer opacity-0"
          onClick={() => onChange(Math.max(min, value - 5))}
        />
      </div>
      <div className="text-center">
        <div className="text-[9px] text-cyan-500/80 font-mono tracking-wider uppercase">{label}</div>
        <div className="text-xs text-cyan-300 font-mono font-bold">
          {value}{units}
        </div>
      </div>
      {/* Hidden range slider for fine control */}
      <input
        type="range"
        min={min}
        max={max}
        value={value}
        onChange={(e) => onChange(Number(e.target.value))}
        className="w-full h-1 opacity-0 absolute pointer-events-none"
      />
    </div>
  )
}

const StarMap = ({ density, brightness, colorVariation, nebulae, zoom }) => {
  const stars = useRef([])
  const canvasRef = useRef(null)

  if (stars.current.length === 0) {
    for (let i = 0; i < 600; i++) {
      stars.current.push({
        x: Math.random() * 100,
        y: Math.random() * 100,
        size: Math.random() * 2.5 + 0.3,
        brightness: Math.random(),
        hue: Math.random() * 60 + 200, // blue to white range
        twinkle: Math.random() * Math.PI * 2,
        twinkleSpeed: Math.random() * 0.02 + 0.005,
      })
    }
  }

  const galaxyArms = [
    { angle: 0, density: 1.2 },
    { angle: Math.PI * 0.6, density: 1.0 },
    { angle: Math.PI * 1.2, density: 1.1 },
    { angle: Math.PI * 1.8, density: 0.9 },
  ]

  const viewStars = stars.current.slice(0, 100 + density * 5)
  const nebulaCount = Math.floor(nebulae / 10)

  return (
    <div className="relative w-full h-full overflow-hidden rounded-lg bg-black">
      {/* Background nebula glow */}
      <div className="absolute inset-0 bg-gradient-radial from-transparent via-transparent to-gray-950" />
      
      {/* Nebula clouds */}
      {Array.from({ length: nebulaCount }).map((_, i) => {
        const nx = 20 + Math.random() * 60
        const ny = 20 + Math.random() * 60
        const nSize = 10 + Math.random() * 25
        const colors = [
          `rgba(120, 50, 180, 0.06)`,
          `rgba(20, 100, 200, 0.05)`,
          `rgba(180, 60, 120, 0.04)`,
          `rgba(60, 180, 200, 0.05)`,
        ]
        return (
          <div
            key={i}
            className="absolute rounded-full blur-3xl"
            style={{
              left: `${nx}%`,
              top: `${ny}%`,
              width: `${nSize}%`,
              height: `${nSize}%`,
              background: colors[i % colors.length],
              opacity: 0.6 + Math.random() * 0.4,
            }}
          />
        )
      })}

      {/* Galaxy spiral arms hint */}
      {galaxyArms.map((arm, i) => (
        <div
          key={i}
          className="absolute w-[80%] h-[80%] left-[10%] top-[10%] rounded-full"
          style={{
            background: `conic-gradient(from ${arm.angle}rad, transparent 0%, rgba(6,182,212,0.015) 15%, transparent 30%)`,
            transform: `rotate(${i * 45}deg)`,
          }}
        />
      ))}

      {/* Stars */}
      <svg className="absolute inset-0 w-full h-full" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
        {viewStars.map((star, i) => {
          const b = star.brightness * brightness * 0.8 + 0.2
          const alpha = Math.min(1, b * (0.5 + 0.5 * Math.sin(star.twinkle + Date.now() * star.twinkleSpeed * 0.001)))
          const hue = star.hue + colorVariation * 30 - 15
          const sz = star.size * (0.8 + zoom * 0.02)
          
          return (
            <g key={i}>
              {sz > 2 && (
                <circle
                  cx={star.x}
                  cy={star.y}
                  r={sz * 2}
                  fill={`hsla(${hue}, 70%, 80%, ${alpha * 0.1})`}
                />
              )}
              <circle
                cx={star.x}
                cy={star.y}
                r={sz}
                fill={`hsla(${hue}, 60%, ${70 + b * 30}%, ${alpha})`}
              />
            </g>
          )
        })}
      </svg>

      {/* Grid overlay */}
      <svg className="absolute inset-0 w-full h-full opacity-20" viewBox="0 0 100 100">
        {Array.from({ length: 11 }).map((_, i) => (
          <line
            key={`v${i}`}
            x1={i * 10}
            y1={0}
            x2={i * 10}
            y2={100}
            stroke="#06b6d4"
            strokeWidth="0.1"
          />
        ))}
        {Array.from({ length: 11 }).map((_, i) => (
          <line
            key={`h${i}`}
            x1={0}
            y1={i * 10}
            x2={100}
            y2={i * 10}
            stroke="#06b6d4"
            strokeWidth="0.1"
          />
        ))}
      </svg>

      {/* Crosshair center */}
      <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
        <div className="relative w-16 h-16">
          <div className="absolute top-0 left-1/2 -translate-x-1/2 w-px h-4 bg-cyan-500/40" />
          <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-px h-4 bg-cyan-500/40" />
          <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-1 h-1 rounded-full bg-cyan-400 shadow-[0_0_6px_#06b6d4]" />
        </div>
      </div>

      {/* Scan lines */}
      <div className="absolute inset-0 pointer-events-none opacity-[0.03]"
        style={{
          backgroundImage: "repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(6,182,212,0.3) 1px, rgba(6,182,212,0.3) 2px)",
        }}
      />

      {/* Status info */}
      <div className="absolute top-2 left-2 flex items-center gap-2">
        <div className="flex items-center gap-1 bg-gray-900/70 border border-cyan-900/50 rounded px-1.5 py-0.5">
          <Activity className="w-2.5 h-2.5 text-cyan-400" />
          <span className="text-[8px] font-mono text-cyan-300">SCAN ACTIVE</span>
        </div>
        <div className="flex items-center gap-1 bg-gray-900/70 border border-green-900/50 rounded px-1.5 py-0.5">
          <div className="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse" />
          <span className="text-[8px] font-mono text-green-300">LINK</span>
        </div>
      </div>

      {/* Coordinates */}
      <div className="absolute bottom-2 right-2 bg-gray-900/70 border border-cyan-900/50 rounded px-1.5 py-0.5">
        <span className="text-[8px] font-mono text-cyan-400">
          S{String(Math.floor(Math.random() * 9999)).padStart(4, '0')} · Q{Math.floor(Math.random() * 7) + 1}
        </span>
      </div>
    </div>
  )
}

const SurveyOutput = ({ surveys, currentSurvey }) => {
  const data = surveys[currentSurvey] || surveys[0]
  if (!data) return null

  const classifications = [
    { label: "CLASS", value: data.class, color: "text-yellow-300" },
    { label: "TYPE", value: data.type, color: "text-cyan-300" },
    { label: "MASS", value: data.mass, color: "text-purple-300" },
    { label: "RADIUS", value: data.radius, color: "text-orange-300" },

          <span>VIS</span>

      {/* Planetary bodies */}

        <span>CONF: {data.confidence}%</span>
        <span>ΔT: {data.timestamp}</span>
      </div>
    </div>
  )
}

const generateSurveyData = (seed) => {
  const classes = ["O", "B", "A", "F", "G", "K", "M"]
  const types = ["Main Seq", "Giant", "Dwarf", "Subgiant", "Supergiant", "Neutron", "White Dwarf"]
  const habClasses = ["CLASS-M", "CLASS-K", "CLASS-L", "CLASS-T", "CLASS-Y", "INHOSPITABLE"]
  
  const names = [
    "Helios Prime", "Arcturus-IV", "Vega Majoris", "Sirius Aethel", "Proxima Centauri",
    "Aldebaran Reach", "Rigel Kantos", "Capella Nex", "Betelgeuse Rift", "Polaris-An",
    "Lyra Mandate", "Cassiopeia-9", "Draconis-VII", "Andromeda's Gate", "Cygnus-X1",
  ]
  const catPrefixes = ["NGC", "IC", "HR", "HD", "SAO", "GJ", "BD", "LTT"]

  const c = classes[Math.floor(Math.random() * classes.length)]
  const t = types[Math.floor(Math.random() * types.length)]
  const hab = habClasses[Math.floor(Math.random() * habClasses.length)]
  const planetCount = 2 + Math.floor(Math.random() * 6)

  return {
    name: names[seed % names.length],
    catalog: `${catPrefixes[seed % catPrefixes.length]} ${10000 + Math.floor(Math.random() * 90000)}`,
    class: c,
    type: t,
    mass: `${(0.3 + Math.random() * 2.5).toFixed(2)} M☉`,
    radius: `${(0.5 + Math.random() * 3).toFixed(2)} R☉`,
    temp: `${(3000 + Math.random() * 25000).toFixed(0)} K`,
    habitability: hab,
    distance: (Math.random() * 1500).toFixed(1),
    coords: `RA ${(Math.random() * 24).toFixed(2)}h · Dec ${(Math.random() > 0.5 ? '+' : '-')}${(Math.random() * 90).toFixed(1)}°`,
    spectrum: Array.from({ length: 12 }, () => Math.random()),
    anomalies: Math.floor(Math.random() * 4),
    confidence: Math.floor(60 + Math.random() * 38),
    timestamp: `${String(Math.floor(Math.random() * 24)).padStart(2, '0')}:${String(Math.floor(Math.random() * 60)).padStart(2, '0')}:${String(Math.floor(Math.random() * 60)).padStart(2, '0')}`,
    planets: Array.from({ length: planetCount }, (_, i) => ({
      name: `${String.fromCharCode(65 + i)}-${Math.floor(Math.random() * 999)}`,
      class: ["Terran", "Gas Giant", "Ice Giant", "Desert", "Oceanic", "Lava", "Barren"][Math.floor(Math.random() * 7)],
      dist: (0.2 + Math.random() * 9).toFixed(2),
      habitable: Math.random() > 0.7,
    })),
  }
}

  const [settings, setSettings] = useState({
    density: 65,
    brightness: 70,

    radiation: 30,

  const handleSurvey = useCallback(() => {
    setIsScanning(true)
    setTimeout(() => {
      const newSurvey = generateSurveyData(surveys.length)

      setCurrentSurvey(surveys.length)

  const handleReset = useCallback(() => {
    setSurveys([generateSurveyData(Math.floor(Math.random() * 1000))])

  )
