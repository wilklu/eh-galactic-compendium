<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EHGC — Galaxy Survey</title>
    <link rel="stylesheet" href="css/styles.css" />
    <style>
      .survey-layout {
        display: grid;
        grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
        gap: 14px;
        margin-top: 14px;
      }

      @media (max-width: 980px) {
        .survey-layout {
          grid-template-columns: 1fr;
        }
      }

      .survey-card {
        background: linear-gradient(180deg, rgba(11, 17, 30, 0.95), rgba(8, 13, 24, 0.92));
        border: 1px solid rgba(215, 184, 106, 0.22);
        border-radius: 16px;
        padding: 14px;
        box-shadow: 0 14px 36px rgba(0, 0, 0, 0.35);
      }

      .survey-title {
        margin: 0 0 6px;
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--gold);
      }

      .survey-subtle {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
      }

      .nav-ribbon {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-top: 12px;
      }

      @media (max-width: 620px) {
        .nav-ribbon {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      .nav-cell {
        border: 1px solid rgba(215, 184, 106, 0.2);
        border-radius: 10px;
        padding: 6px;
        background: rgba(6, 10, 18, 0.6);
      }

      .nav-cell label {
        display: block;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted);
        margin-bottom: 4px;
      }

      .nav-cell select {
        width: 100%;
        background: #0b1326;
        color: var(--gold2);
        border: 1px solid rgba(215, 184, 106, 0.3);
        border-radius: 8px;
        padding: 6px;
      }

      .survey-form {
        margin-top: 12px;
        display: grid;
        gap: 10px;
      }

      .survey-form .label {
        display: block;
        margin-bottom: 4px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .survey-form .input,
      .survey-form textarea,
      .survey-form select {
        width: 100%;
        background: #0b1326;
        color: var(--gold2);
        border: 1px solid rgba(215, 184, 106, 0.28);
        border-radius: 10px;
        padding: 8px 10px;
      }

      .survey-form textarea {
        min-height: 108px;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
      }

      .action-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .hud-strip {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 10px;
      }

      .hud-pill {
        background: rgba(6, 10, 18, 0.75);
        border: 1px solid rgba(215, 184, 106, 0.22);
        border-radius: 10px;
        padding: 8px;
      }

      .hud-label {
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .hud-value {
        margin-top: 4px;
        font-weight: 800;
        font-size: 14px;
      }

      .preview-wrap {
        position: relative;
        margin-top: 10px;
        border-radius: 14px;
        border: 1px solid rgba(215, 184, 106, 0.24);
        overflow: hidden;
        background: radial-gradient(circle at 50% 40%, #1a2542 0%, #0b1120 55%, #050913 100%);
      }

      .preview-overlay {
        position: absolute;
        left: 10px;
        right: 10px;
        top: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        pointer-events: none;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(241, 220, 154, 0.9);
      }

      .preview-chip {
        background: rgba(6, 10, 18, 0.68);
        border: 1px solid rgba(215, 184, 106, 0.25);
        border-radius: 999px;
        padding: 4px 10px;
      }

      #galaxyPreviewImg {
        width: 100%;
        max-height: 470px;
        object-fit: contain;
        display: block;
      }

      .saved-head {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px dashed rgba(215, 184, 106, 0.24);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      #galaxyList {
        margin-top: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      #galaxyList button {
        border-radius: 10px;
        border: 1px solid rgba(215, 184, 106, 0.24);
        background: rgba(10, 14, 24, 0.65);
        color: var(--gold2);
        padding: 7px 10px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-badge" aria-hidden="true"></div>
          <div class="brand-text">
            <div class="brand-title">EHGC</div>
            <div class="brand-subtitle">Galaxy Survey</div>
          </div>
        </div>

        <div class="topbar-right">
          <div class="status">
            <span class="dot" aria-hidden="true"></span>
      <main class="survey-layout">
        <section class="survey-card">
          <h2 class="survey-title">Survey Command</h2>
          <p class="survey-subtle">Galaxy Survey control deck modeled after your reference console.</p>

          <div class="nav-ribbon">
            <div class="nav-cell">
              <label>Expanse</label>
              <select>
                <option>Alpha</option>
                <option>Beta</option>
                <option>Gamma</option>
              </select>
            </div>
            <div class="nav-cell">
              <label>Reach</label>
              <select>
                <option>Inner</option>
                <option>Outer</option>
                <option>Deep</option>
              </select>
            </div>
            <div class="nav-cell">
              <label>Region</label>
              <select>
                <option>Cluster</option>
                <option>Nebula</option>
                <option>Rift</option>
              </select>
            </div>
            <div class="nav-cell">
              <label>Sector</label>
              <select>
                <option>Prime</option>
                <option>Secundus</option>
                <option>Tertius</option>
              </select>
            </div>
          </div>

          <div class="survey-form">
            <div>
              <label class="label" for="galaxyName">Galaxy Name</label>
              <input class="input" id="galaxyName" placeholder="e.g., Perseus Reach" value="Unnamed Galaxy" />
            </div>

            <div>
              <label class="label" for="gridTier">Grid Tier</label>
              <select class="input" id="gridTier">
                <option value="Sector">Sector</option>
                <option value="Subsector">Subsector</option>
                <option value="System">System</option>
              </select>
            </div>

            <div>
              <label class="label" for="seed">Seed</label>
              <input class="input" id="seed" type="number" value="12345" />
            </div>

            <div class="action-grid">
              <button class="btn" id="btnGenerate">Preview</button>
              <button class="btn primary" id="btnSave">Save</button>
              <button class="btn" id="btnUpdate">Update</button>
              <button class="btn" id="btnDelete">Delete</button>
            </div>

            <div>
              <label class="label" for="paramsJson">Params JSON</label>
              <textarea class="input" id="paramsJson" rows="6" placeholder="{}">{}</textarea>
            </div>

            <p class="muted" id="console">Ready.</p>
          </div>
        </section>

        <section class="survey-card">
          <h2 class="survey-title">Survey Display</h2>

          <div class="hud-strip">
            <div class="hud-pill">
              <div class="hud-label">Current Seed</div>
              <div class="hud-value" id="hudSeed">12345</div>
            </div>
            <div class="hud-pill">
              <div class="hud-label">Grid Tier</div>
              <div class="hud-value" id="hudTier">Sector</div>
            </div>
            <div class="hud-pill">
              <div class="hud-label">Signal</div>
              <div class="hud-value">Nominal</div>
            </div>
          </div>

          <div class="preview-wrap">
            <div class="preview-overlay">
              <span class="preview-chip">Galaxy Survey</span>
              <span class="preview-chip" id="hudName">Unnamed Galaxy</span>
            </div>
            <img id="galaxyPreviewImg" alt="Galaxy preview" />
          </div>

          <div class="saved-head">
            <h3 class="survey-title" style="margin: 0">Saved Galaxies</h3>
            <span class="survey-subtle">Select to load and edit</span>
          </div>
          <div id="galaxyList"></div>
        </section>
            />

            <div style="margin-top: 12px">
              <h3 class="panel-title" style="font-size: 1rem; margin-bottom: 8px">Saved Galaxies</h3>
              <div id="galaxyList" style="display: flex; flex-wrap: wrap; gap: 8px"></div>
            </div>
          </div>
    <script type="module">
      import { startUtcClock } from "./js/app-ui.js";

      const seedEl = document.getElementById("seed");
      const tierEl = document.getElementById("gridTier");
      const nameEl = document.getElementById("galaxyName");

      const hudSeed = document.getElementById("hudSeed");
      const hudTier = document.getElementById("hudTier");
      const hudName = document.getElementById("hudName");

      function syncHud() {
        hudSeed.textContent = seedEl.value || "-";
        hudTier.textContent = tierEl.value || "-";
        hudName.textContent = nameEl.value || "Unnamed Galaxy";
      }

      startUtcClock(document.getElementById("utcClock"));
      seedEl.addEventListener("input", syncHud);
      tierEl.addEventListener("change", syncHud);
      nameEl.addEventListener("input", syncHud);
      syncHud();
    </script>
        </section>
      </main>

      <footer class="footer">
        <span class="footer-text">Local Console • Galaxy Survey</span>
      </footer>
    </div>

    <script type="module" src="js/galaxySurvey.js"></script>
  </body>
</html>
